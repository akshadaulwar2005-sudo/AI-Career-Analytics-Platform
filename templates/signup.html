<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#141e30,#243b55);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            font-family:Poppins;
        }

        .card-box{
            background:rgba(255,255,255,0.08);
            padding:40px;
            border-radius:20px;
            width:420px;
            color:white;
        }

        .btn-custom{
            width:100%;
            background:#ff416c;
            border:none;
            padding:12px;
            border-radius:10px;
            color:white;
        }

    </style>

</head>
<body>

<div class="card-box">

    <h1 class="text-center mb-4">📝 Signup</h1>

    <form method="POST">

        <div class="mb-3">
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Username"
                   required>
        </div>

        <div class="mb-3">
            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Email"
                   required>
        </div>

        <div class="mb-3">
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Password"
                   required>
        </div>

        <button class="btn-custom">
            Create Account
        </button>

    </form>

    {% if error %}
        <p class="text-danger mt-3">{{ error }}</p>
    {% endif %}

    <p class="mt-4 text-center">
        Already have an account?
        <a href="/login" class="text-warning">Login</a>
    </p>

</div>

</body>
</html>
