<!DOCTYPE html>
<html>
<head>

<title>AI Career Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#0f172a;color:white;">

<div class="container mt-5">

<h1>🤖 AI Career Assistant</h1>

<form method="POST">

<textarea
name="message"
class="form-control"
rows="5"
placeholder="Ask career questions..."
></textarea>

<br>

<button class="btn btn-primary">
Ask AI
</button>

</form>

{% if response %}

<div class="card mt-4 p-3 bg-dark">

<h4>AI Response:</h4>

<p>{{response}}</p>

</div>

{% endif %}

<a href="/" class="btn btn-warning mt-3">
⬅ Back
</a>

</div>

</body>
</html>
