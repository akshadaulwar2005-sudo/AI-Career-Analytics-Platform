<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#141e30,#243b55);
            color:white;
            min-height:100vh;
            font-family:Poppins;
        }

        .glass{
            background:rgba(255,255,255,0.08);
            padding:30px;
            border-radius:20px;
            margin-top:40px;
        }

        table{
            color:white !important;
        }

        .btn-custom{
            background:#ff416c;
            border:none;
            padding:10px 20px;
            border-radius:10px;
            color:white;
            text-decoration:none;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="glass">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h1>📜 Prediction History</h1>

            <div>
                <a href="/" class="btn-custom">Home</a>
                <a href="/dashboard" class="btn-custom">Dashboard</a>
            </div>

        </div>

        <table class="table table-dark table-striped table-hover">

            <thead>
                <tr>
                    <th>Role</th>
                    <th>City</th>
                    <th>Experience</th>
                    <th>Skill</th>
                    <th>Salary</th>
                </tr>
            </thead>

            <tbody>

                {% for row in history %}

                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }}</td>
                    <td>₹ {{ row[4] }} LPA</td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
